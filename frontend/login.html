<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG AI Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0B1026, #1A1F35);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }

        .login-box h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            color: #8A8FB0;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00D68F;
            background: rgba(0, 214, 143, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00D68F;
            color: #1A1F35;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #00A86B;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 214, 143, 0.3);
        }

        .error-msg {
            color: #FF5C5C;
            background: rgba(255, 92, 92, 0.1);
            border: 1px solid rgba(255, 92, 92, 0.3);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>ECG Monitor Portal</h2>
        <div class="error-msg" id="errorMsg">Invalid login credentials</div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin@ecg.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="admin123" autocomplete="current-password">
        </div>

        <button class="login-btn" onclick="attemptLogin()">Login</button>
    </div>

    <script>
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        function attemptLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (email === 'admin@ecg.com' && pass === 'admin123') {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                const box = document.querySelector('.login-box');
                box.style.transform = 'translateX(-10px)';
                setTimeout(() => box.style.transform = 'translateX(10px)', 100);
                setTimeout(() => box.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => box.style.transform = 'translateX(0)', 300);
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    </script>
</body>

</html>
